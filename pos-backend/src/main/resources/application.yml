server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: pos-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/pos_db
    username: pos_user
    password: pos_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174"
  jwt:
    secret: ${JWT_SECRET:K7d9F2mP4xR8wQ3nL6vB1jT5yH0cA9sE3gU7iO2pZ4mN8bV6xD1fW5kJ3hG0tR7}
    access-token-expiration: 1800000
    refresh-token-expiration: 604800000
  sunat:
    ruc: "10095470837"
    razon-social: "Nuñez Quiñonez Jesus Alberto"
    nombre-comercial: "Importaciones Nuñez"
    direccion: "Av. Tupac Amaru Nro. 306, Urb. El Progreso, Carabayllo, Lima"
    ubigeo: "150106"
  ose:
    provider: ${OSE_PROVIDER:SUNAT}
    api-url: ${OSE_API_URL:https://e-factura.sunat.gob.pe/ol-ti-itcpfegem/billService}
    api-url-beta: ${OSE_API_URL_BETA:https://e-beta.sunat.gob.pe/ol-ti-itcpfegem-beta/billService}
    api-token: ${OSE_API_TOKEN:}
    mode: ${OSE_MODE:BETA}
    usuario-sol: ${OSE_USUARIO_SOL:}
    clave-sol: ${OSE_CLAVE_SOL:}
    ruta-certificado: ${OSE_CERT_PATH:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.importacionesnunez: DEBUG
    org.springframework.security: WARN
